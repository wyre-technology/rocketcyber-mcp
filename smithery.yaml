# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - rocketcyberApiKey
    properties:
      rocketcyberApiKey:
        type: string
        description: Your RocketCyber API key
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/entry.js'], env: { ROCKETCYBER_API_KEY: config.rocketcyberApiKey, MCP_TRANSPORT: 'stdio' } })
